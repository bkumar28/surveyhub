services:
  web:
    build: .
    command: >
      sh -c "poetry run python manage.py migrate &&
             poetry run python manage.py collectstatic --noinput &&
             poetry run gunicorn wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./src:/surveyhub
      - static_volume:/vol/web/static
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: poetry run celery -A wsgi worker --loglevel=info
    volumes:
      - ./src:/surveyhub
    env_file:
      - .env
    depends_on:
      - web
      - redis

  celery-beat:
    build: .
    command: poetry run celery -A wsgi beat --loglevel=info
    volumes:
      - ./src:/surveyhub
    env_file:
      - .env
    depends_on:
      - web
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surveyhub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - static_volume:/vol/web/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
