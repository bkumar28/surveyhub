# .github/workflows/tag-deploy.yaml
name: Deploy on Version Tag

on:
  push:
    tags:
      - 'v*'   # Matches tags like v1.0.0, v2.0.1-beta

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy or Publish
        run: echo "Deploying tag ${{ github.ref_name }}"
