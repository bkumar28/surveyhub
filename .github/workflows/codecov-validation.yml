name: Code Coverage and Config Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_call:

jobs:
  validate-codecov-config:
    name: Validate Codecov Configuration
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Check if .codecov.yml changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            codecov:
              - '.codecov.yml'

      - name: Validate .codecov.yml
        if: steps.filter.outputs.codecov == 'true'
        run: |
          echo "Validating .codecov.yml..."
          result=$(curl --silent --fail --data-binary @.codecov.yml https://codecov.io/validate)
          echo "$result"

          if echo "$result" | grep -q '"status": "error"'; then
            echo "Codecov config validation failed!"
            exit 1
          else
            echo "Codecov config is valid"
          fi

  upload-coverage:
    name: Upload Coverage Report
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies using Poetry
        run: poetry install --with=dev

      - name: Run tests with coverage
        run: |
          poetry run pytest --cov=your_package --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
