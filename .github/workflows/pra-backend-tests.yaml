name: Consolidated Unit Tests

on:
  workflow_call:
    inputs:
      full-crypto-flag:
        description: 'Run all unit tests with full crypto enabled'
        type: boolean
        default: false
        required: false

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  pytest-pra:
    name: Consolidated Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: surveyhub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: surveyhub
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.sha }}

      - name: Add Poetry to PATH
        run: |
          echo "/opt/poetry/bin" >> $GITHUB_PATH
          echo "/usr/local/bin/" >> $GITHUB_PATH

      - name: Cache Poetry Directory
        id: poetry-cache
        run: |
          echo "dir=$(poetry config cache-dir)" >> $GITHUB_OUTPUT

      - name: Restore Poetry Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.poetry-cache.outputs.dir }}
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-

      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev

      - name: Install Dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --with=dev
          poetry run pip install keyring pytest-xdist pytest-rerunfailures

      - name: Ensure Logs Directory
        run: mkdir -p logs

      - name: Run Unit Tests with Coverage
        timeout-minutes: 30
        run: |
          PYTHONPATH=./src DJANGO_SETTINGS_MODULE=settings.development poetry run pytest \
            --cov=src \
            --cov-config=src/.coveragerc \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            src/ \
            --dist loadgroup \
            --numprocesses auto \
            -v \
            --tb=long \
            --reruns 3 \
            --reruns-delay 2 \
            | tee /tmp/pytest.log

      - name: Debug coverage.xml existence
        run: |
          echo "Listing workspace directory:"
          ls -la
          echo "Displaying beginning of coverage.xml (if it exists):"
          head -n 20 coverage.xml || echo "coverage.xml not found"

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-coverage-report
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }} # Optional if public
