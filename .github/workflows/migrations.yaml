name: Check Migrations

on:
  workflow_call:

jobs:
  check-migrations:
    name: Django Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup System Dependencies
        uses: ./.github/actions/setup-system-deps
        with:
          packages: 'libcurl4-openssl-dev libldap2-dev libsasl2-dev libxml2-dev libxmlsec1-dev'

      - name: Setup Python & Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: '3.12'
          poetry-groups: '--with=dev'

      - name: Verify Django install
        run: poetry run python -m django --version

      - name: Run makemigrations check
        working-directory: ./src
        env:
          DJANGO_SETTINGS_MODULE: settings.development
        run: |
          poetry run python manage.py makemigrations --check --dry-run --noinput
