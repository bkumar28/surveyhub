name: 011 Pull Request Analysis

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Analyze
        run: echo "Running analysis..."

  python-quality:
    uses: ./.github/workflows/python-quality.yml
    name: Python Quality Checks
    needs: pull-request-analysis
    secrets: inherit

  codecov-validation:
    uses: ./.github/workflows/codecov-validation.yml
    name: Codecov Validation
    needs: backend-tests
    secrets: inherit

  check-migrations:
    uses: ./.github/workflows/migrations.yml
    name: Check Migrations
    needs: python-quality
    secrets: inherit

  backend-tests:
    uses: ./.github/workflows/backend-tests.yml
    name: Backend Unit Tests
    with:
      full-crypto-flag: false
    needs: python-quality
    secrets: inherit
