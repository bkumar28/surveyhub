name: ActionLint

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  actionlint:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.1

      - name: Cache actionlint
        uses: actions/cache@v4
        with:
          path: ./actionlint
          key: actionlint-${{ runner.os }}-v1.7.7

      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: |
          if [ ! -f ./actionlint ]; then
            bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          fi
          echo "executable=./actionlint" >> "$GITHUB_OUTPUT"

      - name: Check workflow files
        shell: bash
        run: |
          # Check if config file exists and use it, otherwise use ignore flags
          if [ -f actionlint.yaml ]; then
            echo "Using actionlint.yaml config file"
            ${{ steps.get_actionlint.outputs.executable }} \
              -config-file actionlint.yaml \
              -color
          else
            echo "No config file found, using ignore flags"
            ${{ steps.get_actionlint.outputs.executable }} \
              -color \
              -ignore "SC2086" \
              -ignore "SC2155" \
              -ignore "SC2002" \
              -ignore "SC2129" \
              -ignore "SC2046" \
              -ignore "SC2016" \
              -ignore "SC2034" \
              -ignore "SC2005"
          fi
